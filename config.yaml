name: "TypeScript Automation Engine"
description: "Write and run Home Assistant automations in TypeScript with a managed runtime"
version: "1.6.0"
slug: "typescript_automation_engine"
url: "https://github.com/youruser/ha-addon-tae"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 3200
panel_icon: "mdi:language-typescript"
panel_title: "TAE"
options:
  log_level: "info"
  sync_path: "/share/tae"
  ai_provider: "none"
  ai_api_key: ""
  ai_model: ""
  ai_completion_model: ""
schema:
  log_level: list(debug|info|warn|error)
  sync_path: str
  ai_provider: list(none|github|openai|anthropic)
  ai_api_key: str
  ai_model: str
  ai_completion_model: str
startup: application
init: false
map:
  - addon_config:rw
  - share:rw
